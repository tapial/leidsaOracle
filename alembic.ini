# Alembic configuration for LeidsaOracle
#
# The database URL is read from the DATABASE_URL environment variable
# at runtime (see migrations/env.py).  The sqlalchemy.url below is a
# placeholder that gets overridden programmatically.

[alembic]
# Path to the migration environment script.
script_location = migrations

# Template used to generate migration file names.
# Uses the revision id and a slug of the message.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Prepend sys.path with the project root so that "src.*" imports work
# inside migration scripts.
prepend_sys_path = .

# Timezone used for the revision file template.
timezone = UTC

# This value is overridden by migrations/env.py from the DATABASE_URL
# environment variable.  Keep a safe default here for alembic tooling
# that reads the ini directly.
sqlalchemy.url = postgresql+asyncpg://leidsa:leidsa_dev@localhost:5432/leidsa_oracle

[post_write_hooks]
# Run ruff format on newly generated migration files.
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

# ── Logging ──────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
