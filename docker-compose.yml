version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: leidsa_oracle
      POSTGRES_USER: leidsa
      POSTGRES_PASSWORD: ${DB_PASSWORD:-leidsa_dev}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leidsa -d leidsa_oracle"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://leidsa:${DB_PASSWORD:-leidsa_dev}@db:5432/leidsa_oracle
      LEIDSA_DEFAULT_GAME: ${LEIDSA_DEFAULT_GAME:-loto}
      LEIDSA_MONTE_CARLO_ITERATIONS: ${LEIDSA_MONTE_CARLO_ITERATIONS:-100000}
      LEIDSA_CANDIDATE_POOL_SIZE: ${LEIDSA_CANDIDATE_POOL_SIZE:-5000}
      LEIDSA_FINAL_COMBINATION_COUNT: ${LEIDSA_FINAL_COMBINATION_COUNT:-10}
    volumes:
      - ./data:/app/data
      - ./templates:/app/templates
    command: ["bash", "scripts/entrypoint.sh"]

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
    command: >
      streamlit run src/ui/app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true

volumes:
  pgdata:
